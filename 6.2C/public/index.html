<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SIT 725 Calculator</title>

  <!-- Materialize CSS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">

  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

  <!-- Custom Style -->
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>

  <!-- Navbar -->
  <nav>
    <div class="nav-wrapper teal">
      <a href="#" class="brand-logo center">SIT 725 Calculator</a>
    </div>
  </nav>

  <!-- Main -->
  <main class="main-body">
    <div class="container">

      <div class="row">
        <div class="col s12 m8 offset-m2">

          <div class="card calculator-card">

            <div class="card-content">

              <span class="card-title center-align">
                <i class="material-icons">calculate</i>
                Two Number Calculator
              </span>

              <!-- Number 1 -->
              <div class="input-field">
                <input id="number1" type="number">
                <label for="number1">First Number</label>
              </div>

              <!-- Number 2 -->
              <div class="input-field">
                <input id="number2" type="number">
                <label for="number2">Second Number</label>
              </div>

              <!-- Buttons -->
              <div class="center-align button-group">

                <a class="waves-effect waves-light btn" onclick="calculate('add')">
                  <i class="material-icons left">add</i>Add
                </a>

                <a class="waves-effect waves-light btn blue" onclick="calculate('sub')">
                  <i class="material-icons left">remove</i>Subtract
                </a>

                <a class="waves-effect waves-light btn green" onclick="calculate('mul')">
                  <i class="material-icons left">close</i>Multiply
                </a>

                <a class="waves-effect waves-light btn orange" onclick="calculate('div')">
                  <i class="material-icons left">horizontal_rule</i>Divide
                </a>

              </div>

              <!-- Result -->
              <div class="result-box center-align">
                <h5>Result</h5>
                <h4 id="result">0</h4>
              </div>

            </div>

          </div>

        </div>
      </div>

    </div>
  </main>


  <!-- Scripts -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
  <script src="js/scripts.js"></script>

</body>

<footer class="page-footer github-footer">
  <div class="container">
    <div class="row valign-wrapper">
      
      <div class="col s12 m8">
        <h6>Follow me on GitHub</h6>
      </div>

      <div class="col s12 m4 right-align">
        <a 
          href="https://github.com/asangaindunil" 
          target="_blank"
          class="waves-effect waves-light btn github-btn"
        >
          <i class="material-icons left">code</i>
          Follow Me
        </a>
      </div>

    </div>
  </div>
</footer>
</html>
